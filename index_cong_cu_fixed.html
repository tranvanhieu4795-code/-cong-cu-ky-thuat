<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bộ Công Cụ Kỹ Thuật</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg:        #111318;
  --bg2:       #181c24;
  --card:      #1e222e;
  --card-h:    #252a38;
  --border:    rgba(168,230,207,0.12);
  --border-h:  rgba(168,230,207,0.35);
  --accent:    #a8e6cf;
  --accent2:   #7ecfb0;
  --accent-glow: rgba(168,230,207,0.18);
  --text:      #eef2f7;
  --muted:     #7a8599;
  --muted2:    #4a5568;
  --badge-bg:  rgba(168,230,207,0.1);
  --radius:    14px;
  --font:      'Be Vietnam Pro', sans-serif;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

body::before {
  content:'';
  position:fixed; inset:0;
  background-image:
    linear-gradient(rgba(168,230,207,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(168,230,207,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events:none; z-index:0;
}

.wrapper { position:relative; z-index:1; }

/* === HEADER === */
header {
  background: linear-gradient(180deg, #0d1018 0%, var(--bg) 100%);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  position: sticky; top:0; z-index: 100;
  backdrop-filter: blur(20px);
}
.header-inner {
  max-width: 1400px; margin: 0 auto;
  height: 68px;
  display: flex; align-items: center; gap: 20px;
}
.logo {
  display: flex; align-items: center; gap: 12px;
  text-decoration: none; flex-shrink: 0;
}
.logo-icon {
  width: 42px; height: 42px;
  background: #2a2a2e; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 0 20px rgba(168,230,207,0.3);
}
.logo-text { line-height: 1.2; }
.logo-text strong { font-size: 15px; font-weight: 800; color: var(--accent); letter-spacing: -.3px; }
.logo-text span { display: block; font-size: 10px; color: var(--muted); font-weight: 500; letter-spacing: .5px; text-transform: uppercase; }

.search-wrap { flex: 1; max-width: 520px; position: relative; }
.search-wrap svg { position:absolute; left:14px; top:50%; transform:translateY(-50%); color: var(--muted); pointer-events:none; }
.search-input {
  width:100%; padding: 10px 14px 10px 42px;
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--border); border-radius: 10px;
  color: var(--text); font-family: var(--font); font-size: 14px;
  outline: none; transition: all .2s;
}
.search-input:focus { border-color: var(--accent); background: rgba(168,230,207,0.06); box-shadow: 0 0 0 3px rgba(168,230,207,0.1); }
.search-input::placeholder { color: var(--muted); }

.sort-select {
  padding: 10px 14px;
  background: rgba(255,255,255,0.05);
  border: 1px solid var(--border); border-radius: 10px;
  color: var(--text); font-family: var(--font); font-size: 13px;
  outline: none; cursor: pointer; transition: border .2s;
}
.sort-select:focus, .sort-select:hover { border-color: var(--accent); }

/* === HERO === */
.hero {
  max-width: 1400px; margin: 0 auto;
  padding: 36px 24px 24px;
  display: flex; align-items: center; justify-content: space-between;
  flex-wrap: wrap; gap: 20px;
}
.hero-left h1 {
  font-size: clamp(20px, 3vw, 28px); font-weight: 800; letter-spacing: -.5px;
  background: linear-gradient(135deg, #fff 30%, var(--accent));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.hero-left p { color: var(--muted); font-size: 14px; margin-top: 5px; }

.stats-row { display: flex; gap: 24px; }
.stat-item { text-align: center; padding: 12px 20px; background: var(--card); border: 1px solid var(--border); border-radius: 12px; }
.stat-num { font-size: 22px; font-weight: 800; color: var(--accent); }
.stat-lbl { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-top: 2px; }

/* === CATEGORY TABS === */
.cats { max-width: 1400px; margin: 0 auto; padding: 0 24px 20px; display: flex; gap: 8px; flex-wrap: wrap; }
.cat-btn {
  padding: 7px 16px; background: var(--card); border: 1px solid var(--border); border-radius: 20px;
  color: var(--muted); font-family: var(--font); font-size: 12px; font-weight: 600;
  cursor: pointer; transition: all .2s; letter-spacing: .3px;
}
.cat-btn:hover { border-color: var(--accent); color: var(--accent); }
.cat-btn.active { background: var(--accent); color: #111318; border-color: var(--accent); box-shadow: 0 4px 16px rgba(168,230,207,0.3); }

/* === GRID === */
.grid {
  max-width: 1400px; margin: 0 auto;
  padding: 0 24px 60px;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
  gap: 18px;
}

/* === CARD — dùng thẻ <a> thật để không bị chặn popup === */
.card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 22px;
  display: flex; flex-direction: column;
  cursor: pointer; transition: all .25s;
  position: relative; overflow: hidden;
  text-decoration: none; color: inherit; /* reset <a> */
}
.card::before {
  content:''; position:absolute; inset:0;
  background: radial-gradient(circle at 20% 20%, var(--accent-glow), transparent 60%);
  opacity:0; transition: opacity .3s; pointer-events:none;
}
.card:hover { border-color: var(--border-h); transform: translateY(-3px); box-shadow: 0 12px 40px rgba(0,0,0,.5); background: var(--card-h); }
.card:hover::before { opacity: 1; }

.card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 14px; }
.card-icon {
  width: 52px; height: 52px; background: #2a2e3a; border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  border: 1px solid rgba(168,230,207,0.15); transition: all .25s; flex-shrink: 0;
}
.card:hover .card-icon { background: rgba(168,230,207,0.12); border-color: rgba(168,230,207,0.4); box-shadow: 0 0 20px rgba(168,230,207,0.2); }
.card-icon svg { color: var(--accent); }

.card-cat-badge {
  font-size: 10px; font-weight: 700; letter-spacing: .5px; text-transform: uppercase;
  padding: 3px 8px; border-radius: 20px;
  background: var(--badge-bg); color: var(--accent); border: 1px solid rgba(168,230,207,0.2);
}

.card-name { font-size: 15px; font-weight: 700; color: var(--text); margin-bottom: 6px; line-height: 1.35; }
.card-desc { font-size: 12.5px; color: var(--muted); line-height: 1.6; flex: 1; }

.card-footer {
  display: flex; justify-content: space-between; align-items: center;
  margin-top: 16px; padding-top: 14px; border-top: 1px solid var(--border);
}
.visit-count { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--muted); font-weight: 500; }
.visit-count svg { color: var(--muted2); }
.visit-num { color: var(--accent); font-weight: 700; }

/* Nút chỉ để hiển thị, <a> cha đã xử lý click */
.btn-access {
  padding: 7px 18px;
  background: transparent; border: 1px solid rgba(168,230,207,0.35);
  border-radius: 8px; color: var(--accent);
  font-family: var(--font); font-size: 12px; font-weight: 700;
  letter-spacing: .3px; transition: all .2s;
  pointer-events: none;
}
.card:hover .btn-access { background: var(--accent); color: #111318; box-shadow: 0 4px 14px rgba(168,230,207,0.3); }

/* === LIVE PULSE === */
.live-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); display: inline-block; animation: pulse 2s ease-in-out infinite; margin-right: 5px; }
@keyframes pulse { 0%, 100% { opacity:1; transform:scale(1); } 50% { opacity:.4; transform:scale(1.4); } }

/* === TOTAL BANNER === */
.total-banner { max-width:1400px; margin:0 auto; padding:0 24px 18px; }
.total-inner {
  background: linear-gradient(135deg, rgba(168,230,207,0.08), rgba(168,230,207,0.04));
  border: 1px solid rgba(168,230,207,0.2); border-radius: 12px;
  padding: 14px 20px; display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
}
.total-inner .tlabel { font-size: 13px; color: var(--muted); font-weight: 500; }
.total-inner .tnum { font-size: 26px; font-weight: 800; color: var(--accent); font-variant-numeric: tabular-nums; }
.total-inner .tdesc { font-size: 11px; color: var(--muted2); }

/* === EMPTY === */
.empty-msg { grid-column: 1/-1; text-align: center; padding: 60px 20px; color: var(--muted); font-size: 15px; }

/* === TOAST === */
.toast {
  position:fixed; bottom:24px; right:24px;
  background: var(--card); border: 1px solid var(--accent);
  color: var(--accent); padding: 10px 20px; border-radius: 10px;
  font-size: 13px; font-weight: 600;
  opacity:0; transform:translateY(10px); transition: all .3s;
  pointer-events:none; z-index:999; box-shadow: 0 8px 30px rgba(0,0,0,.4);
}
.toast.show { opacity:1; transform:translateY(0); }

@media(max-width:768px){
  .hero { padding: 20px 16px 16px; }
  .grid { padding: 0 16px 40px; grid-template-columns:1fr; }
  .cats { padding: 0 16px 16px; }
  .stats-row { gap:12px; }
  .stat-item { padding:10px 14px; }
  .sort-select { display:none; }
  .total-banner { padding:0 16px 14px; }
}

@keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:none} }
.card { animation: fadeUp .4s ease both; }
</style>
</head>

    desc:'Làm sạch nền hình ảnh chữ ký tự động, xuất PNG trong suốt để sử dụng trên văn bản.',
    cat:'image', catLabel:'Hình ảnh',
    icon:`<svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 20H7L3 16 13 6l8 8-1.5 1.5"/><path d="M6.5 17.5L3 21"/><path d="M15 6l3-3 3 3-3 3z"/></svg>`
  }
];

// ================================================================
// STATE & STORAGE
// ================================================================
const STORAGE_KEY = 'techtools_visits_v2';
const TODAY_KEY   = 'techtools_today_v2';
let currentCat = 'all';
let visits = {}, todayData = {};
const todayDate = new Date().toISOString().slice(0,10);

function loadData() {
  try { visits    = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); } catch(e){ visits={}; }
  try {
    const raw = JSON.parse(localStorage.getItem(TODAY_KEY) || '{}');
    todayData = raw.date === todayDate ? (raw.counts||{}) : {};
  } catch(e){ todayData={}; }
}

function saveData() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(visits));
    localStorage.setItem(TODAY_KEY, JSON.stringify({date:todayDate, counts:todayData}));
  } catch(e){}
}

function recordVisit(id) {
  visits[id]    = (visits[id]   ||0) + 1;
  todayData[id] = (todayData[id]||0) + 1;
  saveData();
  updateStats();
}

// ================================================================
// STATS
// ================================================================
function getTotalVisits(){ return Object.values(visits).reduce((a,b)=>a+b,0); }
function getTodayVisits(){ return Object.values(todayData).reduce((a,b)=>a+b,0); }

function updateStats(){
  const t = getTotalVisits();
  document.getElementById('totalVisits').textContent = t.toLocaleString('vi-VN');
  document.getElementById('grandTotal').textContent  = t.toLocaleString('vi-VN');
  document.getElementById('todayVisits').textContent = getTodayVisits().toLocaleString('vi-VN');
  document.getElementById('totalTools').textContent  = TOOLS.length;
  document.querySelectorAll('[data-visitnum]').forEach(el =>
    el.textContent = (visits[el.getAttribute('data-visitnum')]||0).toLocaleString('vi-VN')
  );
}

// ================================================================
// RENDER — mỗi card là <a href="..."> thật, KHÔNG dùng window.open
// ================================================================
function buildUrl(file){
  // Nếu file đã là URL đầy đủ → giữ nguyên
  if (/^https?:\/\//i.test(file)) return file;
  // Nếu có BASE_URL → ghép vào
  if (BASE_URL) return BASE_URL.replace(/\/?$/,'/') + file;
  // Cùng thư mục
  return file;
}

function getFiltered(){
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  const s = document.getElementById('sortSelect').value;
  let list = TOOLS.filter(t => {
    const mc = currentCat==='all' || t.cat===currentCat;
    const mq = !q || t.name.toLowerCase().includes(q) || t.desc.toLowerCase().includes(q) || t.catLabel.toLowerCase().includes(q);
    return mc && mq;
  });
  if(s==='popular') list=[...list].sort((a,b)=>(visits[b.id]||0)-(visits[a.id]||0));
  if(s==='az')      list=[...list].sort((a,b)=>a.name.localeCompare(b.name,'vi'));
  return list;
}

function renderGrid(){
  const grid = document.getElementById('toolGrid');
  const list = getFiltered();
  if(!list.length){ grid.innerHTML=`<div class="empty-msg">😕 Không tìm thấy công cụ nào</div>`; return; }
  grid.innerHTML = list.map((t,i)=>`
    <a class="card"
       href="${buildUrl(t.file)}"
       target="_blank"
       rel="noopener noreferrer"
       onclick="recordVisit('${t.id}')"
       style="animation-delay:${i*40}ms">
      <div class="card-top">
        <div class="card-icon">${t.icon}</div>
        <span class="card-cat-badge">${t.catLabel}</span>
      </div>
      <div class="card-name">${t.name}</div>
      <div class="card-desc">${t.desc}</div>
      <div class="card-footer">
        <div class="visit-count">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
          </svg>
          <span data-visitnum="${t.id}" class="visit-num">${(visits[t.id]||0).toLocaleString('vi-VN')}</span>
          <span>lượt dùng</span>
        </div>
        <span class="btn-access">Truy cập →</span>
      </div>
    </a>
  `).join('');
}

// ================================================================
// ACTIONS
// ================================================================
function setCategory(cat,btn){
  currentCat=cat;
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderGrid();
}
function filterTools(){ renderGrid(); }

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}

// ================================================================
// ANIMATED COUNTER
// ================================================================
function animCount(el,target,dur=1200){
  const start=performance.now();
  (function step(now){
    const p=Math.min((now-start)/dur,1), ease=1-Math.pow(1-p,3);
    el.textContent=Math.round(target*ease).toLocaleString('vi-VN');
    if(p<1) requestAnimationFrame(step);
  })(performance.now());
}

// ================================================================
// INIT
// ================================================================
loadData();
renderGrid();
setTimeout(()=>{
  animCount(document.getElementById('totalVisits'), getTotalVisits(), 1000);
  animCount(document.getElementById('grandTotal'),  getTotalVisits(), 1200);
  animCount(document.getElementById('todayVisits'), getTodayVisits(),  800);
},100);
</script>
</body>
</html>
