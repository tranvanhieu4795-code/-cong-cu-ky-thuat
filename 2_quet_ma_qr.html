<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quét mã QR</title>
<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
<style>
:root {
  --bg: #0f172a;
  --primary: #0ea5e9;
  --primary-glow: rgba(14,165,233,0.4);
  --secondary: #8b5cf6;
  --glass: rgba(255,255,255,0.05);
  --border: rgba(255,255,255,0.1);
  --text: #f8fafc;
  --muted: #94a3b8;
  --danger: #ef4444;
  --success: #22c55e;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background:radial-gradient(circle at top left,#1e293b,var(--bg));
  color:var(--text);min-height:100vh;
  display:flex;justify-content:center;align-items:flex-start;padding:16px;
}
.app{display:flex;gap:20px;width:100%;max-width:1100px;flex-wrap:wrap;}
.card{
  background:var(--glass);border:1px solid var(--border);border-radius:18px;
  padding:22px;backdrop-filter:blur(16px);box-shadow:0 4px 30px rgba(0,0,0,.3);
}
.left{flex:0 0 340px;}
.right{flex:1;min-width:300px;}

/* TABS */
.tabs{display:flex;gap:10px;background:rgba(0,0,0,.2);padding:5px;border-radius:10px;border:1px solid var(--border);margin-bottom:18px;}
.tab{flex:1;padding:10px;border:none;border-radius:7px;background:transparent;color:var(--muted);font-weight:600;font-size:13px;cursor:pointer;transition:all .25s;}
.tab:hover{color:var(--text);}
.tab.active{background:linear-gradient(135deg,var(--primary),var(--secondary));color:#fff;box-shadow:0 4px 14px var(--primary-glow);}

/* DROP ZONE */
.dropzone{
  border:2px dashed rgba(14,165,233,.4);background:rgba(14,165,233,.04);
  border-radius:14px;height:260px;display:flex;flex-direction:column;
  justify-content:center;align-items:center;cursor:pointer;transition:all .3s;gap:8px;
  color:var(--muted);text-align:center;padding:16px;
}
.dropzone:hover,.dropzone.over{border-color:var(--primary);background:rgba(14,165,233,.1);color:var(--text);}
.dropzone svg{color:var(--primary);}
.dropzone p{margin:0;font-weight:500;font-size:14px;}
.dropzone small{font-size:11px;color:var(--muted);}

/* CAMERA */
#cameraBox{display:none;border-radius:14px;overflow:hidden;height:260px;}
video{width:100%;height:100%;object-fit:cover;display:block;}
canvas{display:none;}

/* SCAN STATUS */
.scan-status{
  margin-top:10px;padding:8px 12px;border-radius:8px;font-size:12px;text-align:center;
  background:rgba(255,255,255,.04);border:1px solid var(--border);color:var(--muted);
}
.scan-status.success{background:rgba(34,197,94,.1);border-color:rgba(34,197,94,.3);color:var(--success);}
.scan-status.error{background:rgba(239,68,68,.1);border-color:rgba(239,68,68,.3);color:#fca5a5;}

/* LIST HEADER */
.list-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--border);}
.list-header h3{margin:0;font-size:16px;font-weight:600;display:flex;align-items:center;gap:8px;}
.badge{background:rgba(255,255,255,.1);padding:2px 10px;border-radius:20px;font-size:12px;color:var(--primary);}
.btn-danger{background:linear-gradient(135deg,#ef4444,#dc2626);color:#fff;border:none;padding:7px 14px;border-radius:7px;cursor:pointer;font-size:12px;font-weight:600;transition:all .2s;}
.btn-danger:hover{opacity:.85;}

/* ITEMS */
#list{max-height:420px;overflow-y:auto;padding-right:4px;}
#list::-webkit-scrollbar{width:5px;}
#list::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:10px;}
.item{
  background:rgba(0,0,0,.2);border:1px solid var(--border);padding:14px;
  border-radius:10px;margin-bottom:10px;display:flex;justify-content:space-between;
  align-items:center;gap:12px;transition:.2s;
}
.item:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.2);border-color:rgba(14,165,233,.25);}
.item-content{flex:1;overflow:hidden;word-break:break-all;font-size:13px;}
.item-content a{color:var(--primary);text-decoration:none;font-weight:600;}
.item-time{font-size:10px;color:var(--muted);margin-top:3px;}
.actions{display:flex;gap:6px;flex-shrink:0;}
.btn-copy{background:rgba(255,255,255,.08);color:var(--text);border:1px solid var(--border);padding:6px 12px;border-radius:7px;cursor:pointer;font-size:12px;font-weight:600;transition:.2s;}
.btn-copy:hover{background:rgba(255,255,255,.18);}
.btn-del{background:rgba(239,68,68,.1);color:#fca5a5;border:1px solid rgba(239,68,68,.25);padding:6px 12px;border-radius:7px;cursor:pointer;font-size:12px;font-weight:600;transition:.2s;}
.btn-del:hover{background:var(--danger);color:#fff;}

.empty{text-align:center;padding:40px 20px;color:var(--muted);font-size:13px;}
.empty svg{margin:0 auto 10px;display:block;opacity:.4;}

@media(max-width:700px){
  .app{flex-direction:column;}
  .left{flex:none;width:100%;}
  .item{flex-direction:column;align-items:flex-start;}
  .actions{width:100%;justify-content:flex-end;margin-top:6px;}
}
</style>
</head>
<body>
<div class="app">
  <!-- LEFT -->
  <div class="card left">
    <div class="tabs">
      <button class="tab active" id="tabUp" onclick="showUpload()">📤 Tải ảnh lên</button>
      <button class="tab" id="tabCam" onclick="showCamera()">📷 Camera</button>
    </div>

    <div class="dropzone" id="uploadBox"
      ondragover="ev.preventDefault();this.classList.add('over')"
      ondragleave="this.classList.remove('over')"
      ondrop="handleDrop(event)">
      <svg width="42" height="42" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
      </svg>
      <p>Click để tải ảnh QR lên</p>
      <small>Kéo & thả hoặc nhấn để chọn file</small>
      <input type="file" id="fileInput" hidden accept="image/*" multiple>
    </div>

    <div id="cameraBox">
      <video id="video" autoplay playsinline></video>
    </div>

    <canvas id="canvas"></canvas>
    <div class="scan-status" id="scanStatus">Chờ quét...</div>
  </div>

  <!-- RIGHT -->
  <div class="card right">
    <div class="list-header">
      <h3>Lịch sử quét <span class="badge" id="count">0</span></h3>
      <button class="btn-danger" onclick="clearAll()">🗑 Xóa tất cả</button>
    </div>
    <div id="list"></div>
  </div>
</div>

<script>
let results = [];
try { results = JSON.parse(localStorage.getItem('qrHistory') || '[]'); } catch(e){}
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let scanning = false;
let cameraStream = null;

function showUpload(){
  document.getElementById('uploadBox').style.display='flex';
  document.getElementById('cameraBox').style.display='none';
  document.getElementById('tabUp').classList.add('active');
  document.getElementById('tabCam').classList.remove('active');
  stopCamera();
}

function showCamera(){
  document.getElementById('uploadBox').style.display='none';
  document.getElementById('cameraBox').style.display='block';
  document.getElementById('tabCam').classList.add('active');
  document.getElementById('tabUp').classList.remove('active');
  startCamera();
}

function startCamera(){
  if(!navigator.mediaDevices?.getUserMedia){
    setStatus('Trình duyệt không hỗ trợ camera.','error'); return;
  }
  navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}})
  .then(stream=>{
    cameraStream=stream; video.srcObject=stream;
    scanning=true; scanFrame();
    setStatus('Đang quét... Hướng camera vào mã QR','');
  })
  .catch(()=>setStatus('Không thể mở camera. Vui lòng cấp quyền.','error'));
}

function stopCamera(){
  scanning=false;
  if(cameraStream){cameraStream.getTracks().forEach(t=>t.stop());cameraStream=null;}
}

function scanFrame(){
  if(!scanning) return;
  if(video.readyState===video.HAVE_ENOUGH_DATA){
    canvas.width=video.videoWidth; canvas.height=video.videoHeight;
    ctx.drawImage(video,0,0);
    const imgData=ctx.getImageData(0,0,canvas.width,canvas.height);
    const code=jsQR(imgData.data,canvas.width,canvas.height,{inversionAttempts:'dontInvert'});
    if(code){
      addResult(code.data);
      setStatus('✅ Đã quét: '+code.data.substring(0,40)+(code.data.length>40?'...':''),'success');
      scanning=false;
      setTimeout(()=>{if(document.getElementById('cameraBox').style.display!=='none'){scanning=true;scanFrame();}},2000);
      return;
    }
  }
  requestAnimationFrame(scanFrame);
}

document.getElementById('uploadBox').onclick=()=>document.getElementById('fileInput').click();
document.getElementById('fileInput').onchange=e=>processFiles(e.target.files);

function handleDrop(ev){
  ev.preventDefault();
  document.getElementById('uploadBox').classList.remove('over');
  processFiles(ev.dataTransfer.files);
}

function processFiles(files){
  [...files].forEach(file=>{
    const reader=new FileReader();
    reader.onload=ev=>{
      const img=new Image();
      img.onload=()=>{
        canvas.width=img.width; canvas.height=img.height;
        ctx.drawImage(img,0,0);
        const data=ctx.getImageData(0,0,canvas.width,canvas.height);
        const code=jsQR(data.data,canvas.width,canvas.height);
        if(code){addResult(code.data);setStatus('✅ Tìm thấy mã QR!','success');}
        else setStatus('❌ Không tìm thấy mã QR trong ảnh: '+file.name,'error');
      };
      img.src=ev.target.result;
    };
    reader.readAsDataURL(file);
  });
  document.getElementById('fileInput').value='';
}

function addResult(text){
  const exists=results.find(r=>r.text===text);
  if(!exists){
    results.unshift({text,time:new Date().toLocaleString('vi-VN')});
    save(); render();
  }
}

function copyText(text){
  navigator.clipboard.writeText(text)
  .then(()=>setStatus('✅ Đã copy vào clipboard!','success'))
  .catch(()=>prompt('Copy thủ công:',text));
}

function deleteItem(i){results.splice(i,1);save();render();}

function clearAll(){
  if(results.length===0) return;
  if(confirm('Xóa toàn bộ lịch sử quét?')){results=[];save();render();}
}

function save(){localStorage.setItem('qrHistory',JSON.stringify(results));}

function setStatus(msg,type){
  const el=document.getElementById('scanStatus');
  el.textContent=msg; el.className='scan-status '+(type||'');
}

function isURL(t){return /^https?:\/\//.test(t);}

function render(){
  const list=document.getElementById('list');
  document.getElementById('count').textContent=results.length;
  if(results.length===0){
    list.innerHTML=`<div class="empty">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
        <rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="3" height="3"/>
      </svg>
      <p>Chưa có mã QR nào được quét</p>
    </div>`;
    return;
  }
  list.innerHTML=results.map((r,i)=>`
    <div class="item">
      <div class="item-content">
        ${isURL(r.text)?`<a href="${escHtml(r.text)}" target="_blank" rel="noopener">🔗 ${escHtml(r.text)}</a>`:`<span>📄 ${escHtml(r.text)}</span>`}
        <div class="item-time">🕒 ${r.time||''}</div>
      </div>
      <div class="actions">
        <button class="btn-copy" onclick="copyText(${JSON.stringify(r.text)})">Copy</button>
        <button class="btn-del" onclick="deleteItem(${i})">Xóa</button>
      </div>
    </div>`).join('');
}

function escHtml(s){
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

render();
</script>
</body>
</html>
